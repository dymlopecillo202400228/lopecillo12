<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student</h1>
    <button onclick= "loadStudents()"> Display Students</button>
<ul id = "List"></ul>
<h1>ADD STUDENT</h1>
<input type ="text" id="name" name="name" placeholder="name"/>
<input type ="text" id="yearlevel" name="yearlevel" placeholder="yearlevel"/>
<button onclick="addStudents()">Submit</button>
</body>
<script>
    async function loadStudents(){
        const res = await fetch(`http://localhost:3000/api/student`)
        const data = await res.json()

        const list = document.getElementById('List')
        List.innerHTML = ""

        data.forEach(students => {
            const li = document.createElement('li')
            li.textContent = `NAME: ${students.name} \n YEAR LEVEL: ${students.yearlevel}`
            List.appendChild(li)
        });
    }
    async function addStudents(){
        const name = document.getElementById('name').value 
        const yearlevel= document.getElementById('yearlevel').value 
        const res = await fetch(`http://localhost:3000/api/student`,
            {
                method : 'POST',
                headers: {   
                'Content-Type': 'application/json'
                },
                body: JSON.stringify({name, yearlevel})
            }
      )
      const data = await res.json()
      console.log(data)
      loadStudents()
    }
</script>

</html>
