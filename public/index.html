<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student CRUD</title>
</head>
<body>

<h1>Student System</h1>

<button onclick="loadStudents()">Display Students</button>

<ul id="List"></ul>

<h2>Add Student</h2>
<input type="text" id="name" placeholder="Name">
<input type="number" id="yearlevel" placeholder="Year Level">
<button onclick="addStudent()">Submit</button>

<script>
const API = "/api/students"; 

async function loadStudents() {
    const res = await fetch(API)
    const data = await res.json()

    const list = document.getElementById("List")
    list.innerHTML = ""

    data.forEach(student => {
        const li = document.createElement("li")
        li.innerHTML = `
            <b>${student.name}</b> (Year ${student.yearlevel})
            <button onclick="editStudent(${student.id}, '${student.name}', ${student.yearlevel})">Edit</button>
            <button onclick="deleteStudent(${student.id})">Delete</button>
        `
        list.appendChild(li)
    })
}

async function addStudent() {
    const name = document.getElementById("name").value
    const yearlevel = document.getElementById("yearlevel").value

    await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, yearlevel })
    })

    loadStudents()
}

async function deleteStudent(id) {
    await fetch(`${API}/${id}`, {
        method: "DELETE"
    })

    loadStudents()
}

function editStudent(id, name, yearlevel) {
    const newName = prompt("New name:", name)
    const newYear = prompt("New year level:", yearlevel)

    if (newName && newYear) {
        updateStudent(id, newName, newYear)
    }
}

async function updateStudent(id, name, yearlevel) {
    await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, yearlevel })
    })

    loadStudents()
}
</script>

</body>
</html>
